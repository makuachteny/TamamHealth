AWSTemplateFormatVersion: '2010-09-09'
Description: >
  TamamHealth platform baseline for af-south-1 (Cape Town). Provisions a 2-AZ
  VPC with public + private subnets, an Application Load Balancer (HTTPS),
  an Auto Scaling Group of 1 EC2 (room to grow), an RDS Postgres instance in
  private subnets, an S3 backups bucket (block-public, encrypted, versioned),
  and the IAM roles + security groups to wire it all up.

  PHI residency: this template constrains every component to the deploying
  region (af-south-1 by default). Do NOT change the default Region parameter
  unless you have explicit sign-off to ship clinical data outside South Africa.

# -----------------------------------------------------------------------------
# Parameters
# -----------------------------------------------------------------------------
Parameters:

  Region:
    Type: String
    Default: af-south-1
    AllowedValues:
      - af-south-1
      - eu-south-2
    Description: >
      Deploy region. Default and strongly preferred = af-south-1 (Cape Town)
      for South Sudan PHI residency. eu-south-2 is allowed only as an
      exceptional fallback with operator sign-off.

  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
    Description: Drives instance sizing and Multi-AZ defaults.

  DomainName:
    Type: String
    Description: Public hostname for the ALB (e.g. app.tamamhealth.org). Used in tags only.

  ACMCertificateArn:
    Type: String
    AllowedPattern: '^arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/.+$'
    Description: >
      ACM certificate ARN attached to the ALB :443 listener. MUST be in the
      same region as this stack (the deploy.sh wrapper enforces this).

  PlatformImage:
    Type: String
    Description: GHCR image:tag for the platform service (e.g. ghcr.io/org/tamamhealth-platform:production).

  WebsiteImage:
    Type: String
    Description: GHCR image:tag for the marketing site.

  GHOwner:
    Type: String
    Default: tamamhealth
    AllowedPattern: '^[A-Za-z0-9_.-]{1,39}$'
    Description: >
      GitHub org/owner that publishes the GHCR images. Used to derive the
      sync-worker image reference (ghcr.io/<GHOwner>/tamamhealth-sync-worker:<env>).

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.medium, t3.large, t3.xlarge, m6i.large, m6i.xlarge]
    Description: EC2 instance size. Default t3.medium for staging; bump to t3.large for prod.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair name for emergency SSH (via SSM Session Manager preferred).

  DBInstanceClass:
    Type: String
    Default: db.t3.small
    AllowedValues: [db.t3.small, db.t3.medium, db.m6g.large]

  DBAllocatedStorage:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 1000
    Description: GB of gp3 storage for RDS.

  DBMasterUsername:
    Type: String
    Default: tamamhealth
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{2,30}$'
    NoEcho: false

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 128
    AllowedPattern: '^[A-Za-z0-9!@#$%^&*()_+=\-]{16,128}$'
    Description: >
      RDS master password. Pass via --parameter-overrides; never commit. The
      CFN parameter is NoEcho so it won't appear in the console UI; the
      generated DATABASE_URL still gets piped into Doppler post-deploy
      (see operator runbook).

  AssignPublicIPToALB:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'true = ALB is internet-facing. Set to false for closed-network installs.'

# -----------------------------------------------------------------------------
# Conditions
# -----------------------------------------------------------------------------
Conditions:
  IsProduction: !Equals [!Ref EnvironmentName, production]
  ALBPublic: !Equals [!Ref AssignPublicIPToALB, 'true']

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
Resources:

  # ---- VPC ------------------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-vpc'
        - Key: PHI
          Value: 'in-scope'
        - Key: Residency
          Value: !Ref Region

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-igw'

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.0.0/24
      AvailabilityZone: !Sub '${AWS::Region}a'
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-public-a'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Sub '${AWS::Region}b'
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-public-b'

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.10.0/24
      AvailabilityZone: !Sub '${AWS::Region}a'
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-private-a'
        - Key: PHI
          Value: 'in-scope'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.11.0/24
      AvailabilityZone: !Sub '${AWS::Region}b'
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-private-b'
        - Key: PHI
          Value: 'in-scope'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-public-rt'

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # Single-AZ NAT for cost. To go multi-AZ, duplicate this resource into
  # AZ-b and route PrivateRouteTableB through it.
  NATEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-nat-eip'

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-nat'

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-private-rt'

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnetARTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ---- Security groups ------------------------------------------------------

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ALB - 443 only.
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP - redirected to 443 by listener rule
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-alb-sg'

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 platform host - only ALB may reach it.
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-app-sg'

  AppIngressFromALBPlatform:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: ALB -> platform :3000

  AppIngressFromALBWebsite:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 3001
      ToPort: 3001
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: ALB -> website :3001

  AppIngressFromALBCouch:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 5984
      ToPort: 5984
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: ALB -> couchdb :5984 (couch.<DomainName>)

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS - only the EC2 app SG may reach it.
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-rds-sg'

  RDSIngressFromApp:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppSecurityGroup
      Description: app -> postgres

  # ---- IAM ------------------------------------------------------------------

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: read-secrets-from-ssm
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # The wildcard at /tamamhealth/<env>/* covers DOPPLER_TOKEN and
              # COUCHDB_PASSWORD (the latter is a SecureString — see
              # infra/aws/README.md for the operator pre-flight). We list the
              # specific names too so a CFN reviewer can see them by grep.
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tamamhealth/${EnvironmentName}/DOPPLER_TOKEN'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tamamhealth/${EnvironmentName}/COUCHDB_PASSWORD'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tamamhealth/${EnvironmentName}/COUCHDB_USER'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tamamhealth/${EnvironmentName}/COUCHDB_WEBHOOK_SECRET'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tamamhealth/${EnvironmentName}/*'
              # SecureString parameters are KMS-encrypted with the AWS-managed
              # ssm key by default; reading them requires kms:Decrypt against
              # that key. Constrained to the SSM service via the condition.
              - Effect: Allow
                Action: kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'
        - PolicyName: pull-from-ghcr-via-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:tamamhealth/${EnvironmentName}/ghcr-*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ---- ALB ------------------------------------------------------------------

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'tamamhealth-${EnvironmentName}-alb'
      Scheme: !If [ALBPublic, internet-facing, internal]
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: deletion_protection.enabled
          Value: !If [IsProduction, 'true', 'false']
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-alb'

  PlatformTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'tmh-${EnvironmentName}-platform'
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 3000
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  WebsiteTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'tmh-${EnvironmentName}-website'
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 3001
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  CouchDBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'tmh-${EnvironmentName}-couch'
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 5984
      TargetType: instance
      # CouchDB exposes /_up with no auth required as its standard health
      # endpoint (returns 200 once the server is ready).
      HealthCheckProtocol: HTTP
      HealthCheckPath: /_up
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      # CouchDB on a fresh EC2 takes ~60s to first-respond after boot.
      # Tolerate one extra missed check on top of that.
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-299
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref ACMCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PlatformTargetGroup

  # Host-based routing on the single :443 listener:
  #   app.<DomainName> / <DomainName>      -> platform :3000 (default action above)
  #   www.<DomainName>                      -> website  :3001
  #   couch.<DomainName>                    -> couchdb  :5984
  ALBListenerRuleWebsite:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 20
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub 'www.${DomainName}'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref WebsiteTargetGroup

  ALBListenerRuleCouchDB:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 10
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub 'couch.${DomainName}'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref CouchDBTargetGroup

  ALBListenerHTTPRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # ---- ASG / Launch template -----------------------------------------------

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub 'tamamhealth-${EnvironmentName}-lt'
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        KeyName: !Ref KeyPairName
        # Amazon Linux 2023 SSM-resolvable AMI param. Resolved at instance
        # launch, so a stack update with no other changes still picks up the
        # latest patched AMI on the next instance refresh.
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
        SecurityGroupIds:
          - !Ref AppSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              VolumeSize: 100
              Encrypted: true
              DeleteOnTermination: true
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        Monitoring:
          Enabled: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub 'tamamhealth-${EnvironmentName}-app'
              - Key: PHI
                Value: 'in-scope'
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf update -y
            dnf install -y docker git amazon-cloudwatch-agent
            systemctl enable --now docker
            usermod -aG docker ec2-user

            # Docker compose v2 plugin
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -sSL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            # Doppler CLI (the platform's entrypoint also installs this if
            # missing inside the container, but having it on the host is
            # convenient for operator debugging).
            curl -Ls --tlsv1.2 https://cli.doppler.com/install.sh | sh

            # Pull required secrets from SSM Parameter Store. The IAM role on
            # this instance is scoped to /tamamhealth/${EnvironmentName}/* and
            # carries kms:Decrypt for the SSM-managed key.
            DOPPLER_TOKEN=$(aws ssm get-parameter \
                --region ${AWS::Region} \
                --name /tamamhealth/${EnvironmentName}/DOPPLER_TOKEN \
                --with-decryption \
                --query 'Parameter.Value' --output text)

            COUCHDB_USER=$(aws ssm get-parameter \
                --region ${AWS::Region} \
                --name /tamamhealth/${EnvironmentName}/COUCHDB_USER \
                --with-decryption \
                --query 'Parameter.Value' --output text 2>/dev/null || echo admin)

            COUCHDB_PASSWORD=$(aws ssm get-parameter \
                --region ${AWS::Region} \
                --name /tamamhealth/${EnvironmentName}/COUCHDB_PASSWORD \
                --with-decryption \
                --query 'Parameter.Value' --output text)

            COUCHDB_WEBHOOK_SECRET=$(aws ssm get-parameter \
                --region ${AWS::Region} \
                --name /tamamhealth/${EnvironmentName}/COUCHDB_WEBHOOK_SECRET \
                --with-decryption \
                --query 'Parameter.Value' --output text)

            install -d -m 0700 /opt/tamamhealth
            cd /opt/tamamhealth

            # Host .env consumed by the embedded docker-compose.yml below. The
            # platform container additionally pulls runtime secrets via Doppler
            # at boot if DOPPLER_TOKEN is set (see platform/Dockerfile entrypoint).
            cat > .env <<ENV_EOF
            DOPPLER_TOKEN=$DOPPLER_TOKEN
            PLATFORM_IMAGE=${PlatformImage}
            WEBSITE_IMAGE=${WebsiteImage}
            SYNC_WORKER_IMAGE=ghcr.io/${GHOwner}/tamamhealth-sync-worker:${EnvironmentName}
            COUCHDB_USER=$COUCHDB_USER
            COUCHDB_PASSWORD=$COUCHDB_PASSWORD
            COUCHDB_WEBHOOK_SECRET=$COUCHDB_WEBHOOK_SECRET
            ENV_EOF
            chmod 0600 .env

            # Embedded docker-compose.yml. Kept inline (rather than s3-cp from
            # the deploy artifact) so a fresh ASG instance can come up without
            # any out-of-band file delivery — the only inputs are SSM params +
            # CFN parameters.
            # NOTE: docker-compose interpolates ${VAR} from the sibling .env
            # file (written above). We have to write LITERAL ${VAR} into this
            # file so compose sees it — which means escaping them through the
            # surrounding CFN Fn::Sub. CFN's documented escape is ${!Name},
            # which renders as ${Name} in the final UserData. Do NOT use
            # $${Name} — CFN does not treat it as an escape and the deploy
            # fails with "variable X in Fn::Sub does not resolve".
            cat > docker-compose.yml <<'COMPOSE_EOF'
            services:
              platform:
                image: ${!PLATFORM_IMAGE}
                restart: unless-stopped
                ports:
                  - "3000:3000"
                environment:
                  NODE_ENV: production
                  COUCHDB_URL: http://couchdb:5984
                  COUCHDB_ADMIN_USER: ${!COUCHDB_USER}
                  COUCHDB_ADMIN_PASSWORD: ${!COUCHDB_PASSWORD}
                  COUCHDB_WEBHOOK_SECRET: ${!COUCHDB_WEBHOOK_SECRET}
                  DOPPLER_TOKEN: ${!DOPPLER_TOKEN}
                depends_on:
                  couchdb:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              website:
                image: ${!WEBSITE_IMAGE}
                restart: unless-stopped
                ports:
                  - "3001:3001"
                environment:
                  NODE_ENV: production
                  DOPPLER_TOKEN: ${!DOPPLER_TOKEN}
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ >/dev/null 2>&1 || exit 1"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              couchdb:
                image: couchdb:3
                restart: unless-stopped
                # Bound to all interfaces on :5984 so the ALB target-group
                # health check (which hits the EC2 ENI on port 5984) can
                # reach /_up. The AppSecurityGroup only permits 5984 from
                # the ALB SG, so this is not externally exposed.
                ports:
                  - "5984:5984"
                environment:
                  COUCHDB_USER: ${!COUCHDB_USER}
                  COUCHDB_PASSWORD: ${!COUCHDB_PASSWORD}
                volumes:
                  - couchdb_data:/opt/couchdb/data
                healthcheck:
                  test: ["CMD-SHELL", "curl -fsS http://localhost:5984/_up || exit 1"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 60s

              sync-worker:
                image: ${!SYNC_WORKER_IMAGE}
                restart: unless-stopped
                environment:
                  COUCHDB_URL: http://${!COUCHDB_USER}:${!COUCHDB_PASSWORD}@couchdb:5984
                  COUCHDB_WEBHOOK_SECRET: ${!COUCHDB_WEBHOOK_SECRET}
                  PLATFORM_SYNC_URL: http://platform:3000/api/sync
                  POLL_INTERVAL_MS: "5000"
                  BATCH_SIZE: "100"
                  STATE_FILE: /var/lib/sync-worker/state.json
                volumes:
                  - sync_worker_state:/var/lib/sync-worker
                depends_on:
                  couchdb:
                    condition: service_healthy
                  platform:
                    condition: service_started

            volumes:
              couchdb_data:
              sync_worker_state:
            COMPOSE_EOF
            chmod 0600 docker-compose.yml

            # If a docker-compose.yml exists (it does — we just wrote one),
            # pull and start the stack. Pulling first means a failed pull
            # doesn't tear down the previously-running stack.
            if [ -f docker-compose.yml ]; then
              docker compose pull
              docker compose up -d
            fi

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: ALBListenerHTTPS
    Properties:
      AutoScalingGroupName: !Sub 'tamamhealth-${EnvironmentName}-asg'
      VPCZoneIdentifier:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: '1'
      HealthCheckType: ELB
      # 600s grace covers: dnf update (~60s), docker install + compose plugin
      # (~30s), image pulls from GHCR (~120s with cold cache), CouchDB initial
      # _up readiness (~60s), platform Next.js cold start (~30s). Tighter
      # values cause the ASG to terminate-before-ready on a cold provision.
      HealthCheckGracePeriod: 600
      TargetGroupARNs:
        - !Ref PlatformTargetGroup
        - !Ref WebsiteTargetGroup
        - !Ref CouchDBTargetGroup
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-app'
          PropagateAtLaunch: true
        - Key: PHI
          Value: 'in-scope'
          PropagateAtLaunch: true

  # ---- RDS ------------------------------------------------------------------

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: TamamHealth Postgres - private subnets only
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  PostgresDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub 'tamamhealth-${EnvironmentName}'
      DBName: safeguard_junub
      Engine: postgres
      EngineVersion: '16.4'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      MultiAZ: !If [IsProduction, true, false]
      PubliclyAccessible: false
      BackupRetentionPeriod: !If [IsProduction, 14, 7]
      PreferredBackupWindow: '01:00-02:00'
      PreferredMaintenanceWindow: 'sun:02:30-sun:03:30'
      DeletionProtection: !If [IsProduction, true, false]
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      CopyTagsToSnapshot: true
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-pg'
        - Key: PHI
          Value: 'analytics-derived'

  # ---- S3 backups bucket (in-account; see backups.md for cross-account
  #     setup if you want stronger isolation) ----------------------------

  BackupsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'tamamhealth-${EnvironmentName}-backups-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: transition-to-glacier-after-30d
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
            ExpirationInDays: 730
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Name
          Value: !Sub 'tamamhealth-${EnvironmentName}-backups'
        - Key: PHI
          Value: 'encrypted-at-rest-and-via-gpg'

  BackupsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BackupsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${BackupsBucket}'
              - !Sub 'arn:aws:s3:::${BackupsBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Sid: DenyUnencryptedObjectUploads
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${BackupsBucket}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'AES256'

# -----------------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------------
Outputs:
  ALBDnsName:
    Description: Public DNS name of the Application Load Balancer.
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDnsName'

  ALBHostedZoneId:
    Description: Hosted zone ID of the ALB (for Route 53 alias records).
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub '${AWS::StackName}-ALBZoneId'

  RDSEndpoint:
    Description: Postgres connection endpoint. Wire DATABASE_URL post-deploy.
    Value: !GetAtt PostgresDB.Endpoint.Address

  BackupsBucketName:
    Description: Name of the in-account backups bucket. For full PHI residency, also create a separate-account bucket per docs/operations/backups.md.
    Value: !Ref BackupsBucket

  AppSecurityGroupId:
    Description: SG ID for the EC2 application instance (use when extending into peered VPCs).
    Value: !Ref AppSecurityGroup

  CouchDBPublicUrl:
    Description: >
      Public HTTPS URL for CouchDB (host-routed by the ALB to the EC2 :5984).
      Create a Route 53 alias for couch.<DomainName> pointing at the ALB so this
      URL resolves. Admin credentials live in /tamamhealth/<env>/COUCHDB_PASSWORD.
    Value: !Sub 'https://couch.${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CouchDBPublicUrl'
