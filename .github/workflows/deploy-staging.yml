name: deploy-staging

# Runs on every push to main. CI must pass first (workflow_run trigger), then
# we build platform + website Docker images, publish them to GHCR, and — if
# the SSH secrets are configured — pull + restart the stack on the staging
# host. The image build/publish half always runs; the SSH deploy half is
# opt-in so the pipeline stays green before the staging server is wired up.

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-and-push:
    name: build + push images to GHCR
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image metadata
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          {
            echo "owner=$OWNER"
            echo "sha=$SHORT_SHA"
            echo "platform_image=ghcr.io/$OWNER/tamamhealth-platform"
            echo "website_image=ghcr.io/$OWNER/tamamhealth-website"
            echo "sync_worker_image=ghcr.io/$OWNER/tamamhealth-sync-worker"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push platform image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.platform_image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.platform_image }}:staging
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

      - name: Build + push website image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.website_image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.website_image }}:staging
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website

      - name: Build + push sync-worker image
        uses: docker/build-push-action@v6
        with:
          context: ./sync-worker
          file: ./sync-worker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sync_worker_image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.sync_worker_image }}:staging
          cache-from: type=gha,scope=sync-worker
          cache-to: type=gha,mode=max,scope=sync-worker

  ssh-deploy:
    name: ssh deploy to staging host
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check whether SSH secrets are configured
        id: gate
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -n "$STAGING_SSH_HOST" ] && [ -n "$STAGING_SSH_USER" ] && [ -n "$STAGING_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Staging SSH not configured::Skipping deploy. Set STAGING_SSH_HOST/USER/KEY in the staging environment to enable."
          fi

      - name: Set up SSH agent
        if: steps.gate.outputs.ready == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Pull + restart stack
        if: steps.gate.outputs.ready == 'true'
        env:
          HOST: ${{ secrets.STAGING_SSH_HOST }}
          USER: ${{ secrets.STAGING_SSH_USER }}
          APP_DIR: ${{ secrets.STAGING_APP_DIR || '/opt/tamamhealth' }}
          SHA: ${{ needs.build-and-push.outputs.sha }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          ssh "$USER@$HOST" \
            "cd $APP_DIR && \
             export GH_OWNER='$GH_OWNER' IMAGE_TAG=staging && \
             docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull && \
             docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d && \
             docker image prune -f && \
             echo 'Deployed sha=$SHA tag=staging'"
