name: mobile-beta

# Mobile beta builds for ticket #27. Manual-only — `workflow_dispatch` lets
# the release manager pick a target (TestFlight / Play internal track / both)
# and which channel/environment to build for.
#
# Gated on EAS auth: the build runs only if `EXPO_TOKEN` is configured in the
# `mobile-beta` GitHub environment. Without it, the job logs a clean notice
# and exits 0 — same shape as the staging/production SSH gates so that the
# pipeline stays green before Apple/Google developer accounts exist.
#
# Setup once accounts are in place:
#
#   1. Repo settings → Environments → create `mobile-beta` (with required
#      reviewers if you want approval before each beta).
#   2. Add environment secret `EXPO_TOKEN` (from `eas whoami` / Expo
#      dashboard → Access Tokens).
#   3. (Apple) ensure App Store Connect API key is configured on the EAS
#      project — that's an EAS-side setting, not a GH secret.
#   4. (Google) ensure the Play Console service-account JSON is uploaded to
#      EAS as an env file.
#   5. Run the workflow manually with the desired target.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish the beta'
        required: true
        type: choice
        default: testflight
        options:
          - testflight
          - play-internal
          - both
      profile:
        description: 'EAS build profile (defined in mobile/eas.json)'
        required: true
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: mobile-beta-${{ github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: EAS Build + Submit (${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    environment: mobile-beta
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Check whether EXPO_TOKEN is configured
        id: gate
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mobile beta not configured::EXPO_TOKEN is unset on the mobile-beta environment. Skipping. See the header of this workflow for setup."
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install EAS CLI
        if: steps.gate.outputs.ready == 'true'
        run: npm install -g eas-cli@latest

      # Build for both platforms when target=both, otherwise only one.
      - name: EAS Build — iOS (TestFlight)
        if: |
          steps.gate.outputs.ready == 'true' &&
          (github.event.inputs.target == 'testflight' || github.event.inputs.target == 'both')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait

      - name: EAS Build — Android (Play internal)
        if: |
          steps.gate.outputs.ready == 'true' &&
          (github.event.inputs.target == 'play-internal' || github.event.inputs.target == 'both')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait

      # The Submit step pushes the latest finished build to the matching
      # store. Run it as a separate step so a failed Submit doesn't undo the
      # build (it's already up on the EAS dashboard).
      - name: EAS Submit — iOS → TestFlight
        if: |
          steps.gate.outputs.ready == 'true' &&
          (github.event.inputs.target == 'testflight' || github.event.inputs.target == 'both')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform ios --latest --non-interactive

      - name: EAS Submit — Android → Play internal track
        if: |
          steps.gate.outputs.ready == 'true' &&
          (github.event.inputs.target == 'play-internal' || github.event.inputs.target == 'both')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform android --latest --non-interactive
